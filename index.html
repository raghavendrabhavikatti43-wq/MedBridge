<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBridge+ | Healthcare Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --card-white: #ffffff;
            --text-muted: #64748b;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --radius-lg: 1.5rem;
            --radius-md: 1rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 3rem auto;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-box {
            background: white;
            padding: 0.75rem 2rem;
            border-radius: 100px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }
        .logo-box span { color: var(--accent); }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .content-wrap {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 3rem;
            letter-spacing: -0.04em;
        }

        .grid-horizontal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .option-card {
            background: white;
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            position: relative;
        }

        .option-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 25px 30px -10px rgba(37, 99, 235, 0.15);
        }

        .option-card.active {
            border-color: var(--accent);
            background: #f8faff;
        }

        .emoji-box {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .option-card:hover .emoji-box { background: #dbeafe; }

        .option-label { font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .option-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .wizard-card {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .steps-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .step-pill {
            height: 6px;
            width: 40px;
            background: #e2e8f0;
            border-radius: 10px;
            transition: all 0.5s ease;
        }
        .step-pill.active { background: var(--accent); width: 80px; }

        .severity-row {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .sev-btn {
            flex: 1;
            padding: 2rem;
            border-radius: 1.5rem;
            border: 3px solid #f1f5f9;
            background: white;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .footer-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 4rem;
            gap: 1.5rem;
        }

        .action-btn {
            padding: 1.25rem 2.5rem;
            border-radius: 1rem;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .action-primary { background: var(--accent); color: white; }
        .action-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .action-secondary { background: #f1f5f9; color: var(--primary); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            text-align: left;
        }

        .summary-tile {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid #e2e8f0;
        }

        .triage-hero {
            grid-column: span 2;
            padding: 2.5rem;
            border-radius: 1.5rem;
            text-align: center;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .grid-horizontal { grid-template-columns: repeat(2, 1fr); }
            .severity-row { flex-direction: column; }
        }

        @media (max-width: 600px) {
            .grid-horizontal { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr; }
            .triage-hero { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-box">MED<span>BRIDGE+</span></div>
    </header>

    <main class="content-wrap">
        <!-- View: Lang -->
        <div id="view-lang">
            <h1 class="section-title">Select clinic language</h1>
            <div class="grid-horizontal">
                <div class="option-card" onclick="app.setLang('en')">
                    <div class="emoji-box">🇬🇧</div>
                    <div class="option-label">English</div>
                    <div class="option-desc">Universal clinical summary</div>
                </div>
                <div class="option-card" onclick="app.setLang('hi')">
                    <div class="emoji-box">🇮🇳</div>
                    <div class="option-label">हिन्दी</div>
                    <div class="option-desc">Hindi Language</div>
                </div>
                <div class="option-card" onclick="app.setLang('te')">
                    <div class="emoji-box">🇮🇳</div>
                    <div class="option-label">తెలుగు</div>
                    <div class="option-desc">Telugu Language</div>
                </div>
                <div class="option-card" onclick="app.setLang('ta')">
                    <div class="emoji-box">🇮🇳</div>
                    <div class="option-label">தமிழ்</div>
                    <div class="option-desc">Tamil Language</div>
                </div>
                <div class="option-card" onclick="app.setLang('bn')">
                    <div class="emoji-box">🇮🇳</div>
                    <div class="option-label">বাংলা</div>
                    <div class="option-desc">Bengali Language</div>
                </div>
            </div>
        </div>

        <!-- View: Wizard -->
        <div id="view-wizard" class="hidden">
            <div class="steps-nav" id="steps-pills"></div>
            <div class="wizard-card">
                <h2 class="section-title" id="wiz-title" style="font-size: 2rem; margin-bottom: 2rem;">Question</h2>
                <div id="wiz-content"></div>
                <div class="footer-controls">
                    <button class="action-btn action-secondary" id="wiz-back" onclick="app.prev()">Back</button>
                    <button class="action-btn action-primary" id="wiz-next" onclick="app.next()">Continue</button>
                </div>
            </div>
        </div>

        <!-- View: Summary -->
        <div id="view-summary" class="hidden">
            <div class="wizard-card" style="text-align: center;">
                <h2 class="section-title" style="font-size: 2rem; margin-bottom: 1.5rem;">Diagnostic Summary</h2>
                <div id="summary-output"></div>
                <div class="footer-controls">
                    <button class="action-btn action-primary" onclick="location.reload()">New Intake Session</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const LANGS = {
            "en": { "q1": "Where is the problem?", "q2": "What kind of symptom?", "q3": "Select severity level", "q4": "Symptom duration?", "q5": "Associated issues?", "q6": "Any final remarks?", "head":"Head","chest":"Chest","abdomen":"Abdomen","throat":"Throat","back":"Back","limbs":"Limbs","pain":"Pain","fever":"Fever","cough":"Cough","vomiting":"Vomiting","breathlessness":"Shortness of breath","dizziness":"Fainting/Dizziness","mild":"Mild","mod":"Moderate","sev":"Severe","today":"Starts Today","1-2":"1-2 Days","week":"1 Week","long":"Chronic (>1w)","weakness":"General Weakness","bleeding":"Active Bleeding" },
            "hi": { 
                "q1": "समस्या कहाँ है?", "q2": "लक्षण क्या है?", "q3": "गंभीरता चुनें", "q4": "कब से है?", "q5": "अन्य समस्याएं?", "q6": "कोई टिप्पणी?",
                "head":"सिर","chest":"छाती","abdomen":"पेट","throat":"गला","back":"पीठ","limbs":"हाथ-पांव",
                "pain":"दर्द","fever":"बुखार","cough":"खांसी","vomiting":"उल्टी","breathlessness":"सांस फूलना","dizziness":"चक्कर",
                "mild":"हल्का","mod":"मध्यम","sev":"गंभीर",
                "today":"आज से","1-2":"1-2 दिन","week":"1 सप्ताह","long":"एक सप्ताह से अधिक"
            },
            "te": { 
                "q1": "సమస్య ఎక్కడ ఉంది?", "q2": "ఎలాంటి లక్షణం?", "q3": "తీవ్రత స్థాయి", "q4": "ఎప్పటి నుండి?", "q5": "ఇతర సమస్యలు?", "q6": "గమనికలు?",
                "head":"తల","chest":"ఛాతీ","abdomen":"కడుపు","throat":"గొంతు","back":"వెన్ను","limbs":"కాళ్లు చేతులు",
                "pain":"నొప్పి","fever":"జ్వరం","cough":"దగ్గు","vomiting":"వాంతులు","breathlessness":"ఆయాసం","dizziness":"కళ్ళు తిరగడం",
                "mild":"తక్కువ","mod":"మధ్యస్థం","sev":"ఎక్కువ",
                "today":"ఈ రోజే","1-2":"1-2 రోజులు","week":"ఒక వారం","long":"వారం కంటే ఎక్కువ",
                "weakness":"నీరసం","bleeding":"రక్తస్రావం"
            },
            "ta": { 
                "q1": "பிரச்சனை எங்கே?", "q2": "அறிகுறி என்ன?", "q3": "தீவிரத்தன்மை?", "q4": "எவ்வளவு காலம்?", "q5": "பிற அறிகுறிகள்?",
                "head":"தலை","chest":"நெஞ்சு","abdomen":"வயிறு","throat":"தொண்டை","back":"முதுகு","limbs":"கை கால்கள்",
                "pain":"வலி","fever":"காய்ச்சல்","cough":"இருமல்","vomiting":"வாந்தி","breathlessness":"மூச்சுத்திணறல்"
            },
            "bn": { 
                "q1": "সঙ্কট কোথায়?", "q2": "কি লক্ষণ?", "q3": "তীব্রতা কি?", "q4": "কতদিন?",
                "head":"মাথা","chest":"বুক","abdomen":"পেট","throat":"গলা","back":"পিঠ","limbs":"হাত-পা",
                "pain":"ব্যথা","fever":"জ্বর","cough":"কাশি"
            }
        };

        const DATA = {
            areas: [{id:'head',icon:'🧠'},{id:'chest',icon:'🫁'},{id:'abdomen',icon:'🤢'},{id:'throat',icon:'🗣️'},{id:'back',icon:'🧘'},{id:'limbs',icon:'🦵'}],
            types: [{id:'pain',icon:'⚡'},{id:'fever',icon:'🌡️'},{id:'cough',icon:'😷'},{id:'vomiting',icon:'🤮'},{id:'breathlessness',icon:'😮‍💨'},{id:'dizziness',icon:'🌀'}],
            sevs: [{id:'mild',c:'#10b981'},{id:'mod',c:'#f59e0b'},{id:'sev',c:'#ef4444'}],
            durs: [{id:'today',icon:'🕛'},{id:'1-2',icon:'⏳'},{id:'week',icon:'🗓️'},{id:'long',icon:'⚠️'}],
            extra: [{id:'fever',icon:'🌡️'},{id:'vomiting',icon:'🤮'},{id:'weakness',icon:'🔋'},{id:'breathlessness',icon:'😮‍💨'},{id:'bleeding',icon:'🩸'}]
        };

        const app = {
            step: 1, lang: 'en', form: { area:null, type:null, sev:null, dur:null, extra:[], note:'' },

            setLang(l) {
                this.lang = l;
                document.getElementById('view-lang').classList.add('hidden');
                document.getElementById('view-wizard').classList.remove('hidden');
                this.render();
            },

            t(k) { return (LANGS[this.lang] && LANGS[this.lang][k]) || LANGS['en'][k] || k; },

            render() {
                const c = document.getElementById('wiz-content');
                const t = document.getElementById('wiz-title');
                const p = document.getElementById('steps-pills');
                c.innerHTML = '';
                t.innerText = this.t(`q${this.step}`);
                p.innerHTML = '';
                for(let i=1;i<=6;i++) p.innerHTML += `<div class="step-pill ${i===this.step?'active':''}"></div>`;

                const grid = document.createElement('div');
                grid.className = 'grid-horizontal';

                if(this.step === 1) DATA.areas.forEach(v => grid.appendChild(this.box(v, 'area')));
                else if(this.step === 2) DATA.types.forEach(v => grid.appendChild(this.box(v, 'type')));
                else if(this.step === 3) {
                    const row = document.createElement('div'); row.className = 'severity-row';
                    DATA.sevs.forEach(s => {
                        const b = document.createElement('button'); b.className = 'sev-btn';
                        b.style.borderColor = s.c; b.style.color = s.c;
                        if(this.form.sev === s.id) b.style.background = s.c + '10';
                        b.innerText = this.t(s.id).toUpperCase();
                        b.onclick = () => { this.form.sev = s.id; this.render(); };
                        row.appendChild(b);
                    });
                    c.appendChild(row);
                } else if(this.step === 4) DATA.durs.forEach(v => grid.appendChild(this.box(v, 'dur')));
                else if(this.step === 5) DATA.extra.forEach(v => {
                    const b = this.box(v, null); b.onclick = () => {
                        if(this.form.extra.includes(v.id)) this.form.extra = this.form.extra.filter(x=>x!==v.id);
                        else this.form.extra.push(v.id); this.render();
                    };
                    if(this.form.extra.includes(v.id)) b.classList.add('active');
                    grid.appendChild(b);
                });
                else if(this.step === 6) {
                    const tx = document.createElement('textarea'); tx.style.width='100%'; tx.style.padding='1.5rem'; tx.style.borderRadius='1.5rem';
                    tx.placeholder = this.t('q6'); tx.rows=5; tx.value = this.form.note;
                    tx.oninput = (e) => this.form.note = e.target.value; c.appendChild(tx);
                }

                if(grid.childNodes.length > 0) c.appendChild(grid);
                this.update();
            },

            box(item, key) {
                const b = document.createElement('div');
                b.className = `option-card ${key && this.form[key]===item.id?'active':''}`;
                b.innerHTML = `<div class="emoji-box">${item.icon}</div><div class="option-label">${this.t(item.id)}</div>`;
                if(key) b.onclick = () => { this.form[key] = item.id; this.render(); };
                return b;
            },

            update() {
                const nb = document.getElementById('wiz-back');
                nb.style.visibility = this.step === 1 ? 'hidden' : 'visible';
                const next = document.getElementById('wiz-next');
                next.innerText = this.step === 6 ? 'Generate clinical card' : 'Next Question';
                const valid = [null, this.form.area, this.form.type, this.form.sev, this.form.dur][this.step];
                next.disabled = [1,2,3,4].includes(this.step) && !valid;
            },

            next() { if(this.step < 6) { this.step++; this.render(); } else this.summary(); },
            prev() { if(this.step > 1) { this.step--; this.render(); } },

            summary() {
                document.getElementById('view-wizard').classList.add('hidden');
                document.getElementById('view-summary').classList.remove('hidden');
                const high = (this.form.area === 'chest' && this.form.type === 'pain') || (this.form.sev === 'sev');
                const out = document.getElementById('summary-output');
                out.innerHTML = `
                    <div class="triage-hero" style="background:${high?'#fee2e2':'#dcfce7'}; color:${high?'#991b1b':'#166534'}">
                        ${high ? 'HIGH PRIORITY RED FLAG' : 'STABLE CASE'}
                    </div>
                    <div class="summary-grid">
                        <div class="summary-tile"><small>PATIENT LANGUAGE</small><br><strong>${this.lang.toUpperCase()}</strong></div>
                        <div class="summary-tile"><small>CHIEF COMPLAINT</small><br><strong>${this.t(this.form.type)} (${this.t(this.form.area)})</strong></div>
                        <div class="summary-tile"><small>SEVERITY</small><br><strong>${this.t(this.form.sev)}</strong></div>
                        <div class="summary-tile"><small>HISTORY</small><br><strong>${this.t(this.form.dur)} ago</strong></div>
                        <div class="summary-tile" style="grid-column: span 2; border-style:dashed;">
                            <small>DOCTOR CLINICAL BRIEF (AUTO-GENERATED)</small>
                            <p style="font-style:italic; margin-top:5px; font-weight:600">Patient presents with ${this.form.sev} ${this.form.type} in the ${this.form.area} region. Onset: ${this.form.dur}. Triage: ${high?'URGENT':'ROUTINE'}.</p>
                        </div>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
